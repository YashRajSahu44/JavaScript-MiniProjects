<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stay Motivated | Random Quote Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@1,500;1,600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">
    <div class="card">

      <!-- Top bar -->
      <header class="topbar">
        <div class="logo">
          <span class="logo-mark"></span>
          Stay Motivated
        </div>
        <nav class="top-links">
          <a href="#">About</a>
          <a href="#" class="active-link">Daily Tip</a>
        </nav>
      </header>

      <!-- Category pills -->
      <div class="pills">
        <span class="pill">Motivation</span>
        <span class="pill">Discipline</span>
        <span class="pill">Growth</span>
        <span class="pill">Focus</span>
        <span class="pill">Success</span>
        <span class="pill">Mindset</span>
      </div>

      <!-- Hero / quote section -->
      <main class="hero">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>

        <span class="mark">&#10077;</span>

        <h1 id="quote">Dream big, start small, act now.</h1>

        <p class="subtitle">A short, sharp dose of motivation — one tap away.</p>

        <button>Generate Quote</button>
      </main>

      <!-- Footer -->
      <footer class="footer">
        <p class="news"><span class="dot"></span><strong>Tip:</strong>&nbsp; Every click brings a fresh spark of motivation.</p>
        <div class="socials">
          <a href="https://github.com/yashrajsahu44" target="_blank" rel="noopener">GitHub</a>
          <a href="https://www.linkedin.com/in/yashraj-sahu-588825375" target="_blank" rel="noopener">LinkedIn</a>
          <a href="#">Twitter</a>
        </div>
      </footer>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
